name: Prebuild iOS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prebuild:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Create Expo cache directory (workaround for EACCES in icon generation)
        run: |
          mkdir -p .expo/web
          chmod -R 777 .expo 2>/dev/null || true
          mkdir -p /tmp/expo-cache
          chmod -R 777 /tmp/expo-cache

      - name: Run prebuild with writable cache
        env:
          EXPO_CACHE_DIR: /tmp/expo-cache
          TMPDIR: /tmp
        run: npx expo prebuild --platform ios --no-install

      - name: Commit and push ios folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ios/
          git status
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add ios folder from prebuild (bypass EAS server permission bug)"
            git push
          fi
